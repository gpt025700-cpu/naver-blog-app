<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>블로그 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --green: #03C75A; --green-dark: #02a84a; --green-light: #E1F5EE; --bg: #f5f6f8; --white: #ffffff; --border: #e0e0e0; --text: #111; --muted: #888; --red: #e24b4a; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; }

/* 헤더 */
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.header-title { font-size: 17px; font-weight: 700; color: var(--text); }

/* 화면 */
.screen { display: none; flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; }
.screen.active { display: block; }

/* 입력 폼 */
.field { margin-bottom: 18px; }
.label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.label { font-size: 14px; font-weight: 600; color: var(--text); }
.required { color: var(--red); }
.paste-btn { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: var(--green-light); border: none; border-radius: 8px; color: var(--green); font-size: 12px; font-weight: 500; cursor: pointer; }
input[type=url], input[type=text] { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--text); background: var(--white); outline: none; font-family: inherit; }
input:focus { border-color: var(--green); }
.hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
.related-list { display: flex; flex-direction: column; gap: 8px; }
.error-box { background: #fff0f0; border: 1px solid #ffb8b8; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; line-height: 1.5; }

/* 버튼 */
.btn-primary { width: 100%; padding: 15px; background: var(--green); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
.btn-primary:active { background: var(--green-dark); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-outline { width: 100%; padding: 13px; background: var(--white); color: var(--green); border: 1.5px solid var(--green); border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
.btn-outline:active { background: var(--green-light); }
.btn-copy { width: 100%; padding: 12px; background: #f5f5f5; color: var(--text); border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-copy:active, .btn-copy.copied { background: var(--green-light); color: var(--green); }

/* 로딩 */
.loading-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; background: var(--green-light); border-radius: 16px; margin-top: 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid #c8eeda; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: 17px; font-weight: 600; color: var(--text); }
.loading-sub { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }
.cancel-btn { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 8px; font-family: inherit; }

/* 결과 */
.result-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.result-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.result-title { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; }
.result-content { font-size: 14px; color: var(--text); line-height: 1.8; white-space: pre-wrap; word-break: break-word; max-height: 280px; overflow-y: auto; }
.btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
.btn-row .btn-copy { flex: 1; }
.btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }

/* 이미지 화면 */
.img-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.img-count { font-size: 13px; color: var(--muted); }
.img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.img-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #f0f0f0; }
.img-item img { width: 100%; height: 100%; object-fit: cover; }
.img-save { position: absolute; bottom: 4px; right: 4px; width: 26px; height: 26px; background: var(--green); border: none; border-radius: 50%; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.img-save.saved { background: #0F6E56; }
.img-loading { text-align: center; padding: 40px 20px; color: var(--muted); }
.back-btn { background: none; border: none; color: var(--green); font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 4px; margin-bottom: 16px; font-family: inherit; }

/* 탭바 */
.tab-bar { display: flex; border-top: 1px solid var(--border); background: var(--white); position: sticky; bottom: 0; }
.tab { flex: 1; padding: 12px; background: none; border: none; font-size: 12px; color: var(--muted); cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.tab.active { color: var(--green); }
.tab-icon { font-size: 18px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">N</div>
    <div class="header-title" id="headerTitle">블로그 생성기</div>
  </div>

  <!-- 입력 화면 -->
  <div class="screen active" id="formScreen">
    <div class="field">
      <div class="label-row">
        <span class="label">네이버 기사 URL <span class="required">*</span></span>
        <button class="paste-btn" onclick="pasteToInput('articleUrl')">📋 붙여넣기</button>
      </div>
      <input type="url" id="articleUrl" placeholder="https://n.news.naver.com/...">
    </div>

    <div class="field">
      <div class="label-row">
        <span class="label">키워드 <span class="required">*</span></span>
        <button class="paste-btn" onclick="pasteToInput('keyword')">📋 붙여넣기</button>
      </div>
      <input type="text" id="keyword" placeholder="블로그 핵심 키워드" maxlength="50">
    </div>

    <div class="field">
      <div class="label-row">
        <span class="label">함께 보면 좋은 글 <span style="color:var(--muted);font-weight:400">(저장됨)</span></span>
      </div>
      <div class="related-list">
        <input type="url" id="related0" placeholder="관련 글 URL 1" oninput="saveRelated()">
        <input type="url" id="related1" placeholder="관련 글 URL 2" oninput="saveRelated()">
        <input type="url" id="related2" placeholder="관련 글 URL 3" oninput="saveRelated()">
      </div>
      <div class="hint">입력하면 앱을 꺼도 자동으로 저장돼요</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="btn-primary" id="generateBtn" onclick="startGenerate()">
      ✨ 블로그 글 생성하기
    </button>
  </div>

  <!-- 로딩 화면 -->
  <div class="screen" id="loadingScreen">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-title">블로그 글을 작성 중이에요</div>
      <div class="loading-sub" id="loadingText">앱을 닫아도 서버에서 계속 작성합니다.<br>다시 돌아오면 자동으로 결과를 확인합니다.</div>
      <button class="cancel-btn" onclick="cancelGenerate()">취소하고 다시 작성</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-label">제목</div>
      <div class="result-title" id="resultTitle"></div>
    </div>

    <div class="result-card">
      <div class="result-label">본문</div>
      <div class="result-content" id="resultContent"></div>
    </div>

    <div class="btn-group">
      <div class="btn-row">
        <button class="btn-copy" id="copyTitleBtn" onclick="copyText('title')">제목 복사</button>
        <button class="btn-copy" id="copyContentBtn" onclick="copyText('content')">본문 복사</button>
      </div>
      <button class="btn-copy" id="copyBothBtn" onclick="copyText('both')">📋 제목 + 본문 한번에 복사</button>
      <button class="btn-outline" onclick="goToImages()">🖼 관련 이미지 찾기</button>
      <button class="btn-outline" onclick="resetForm()">+ 새 글 작성하기</button>
    </div>
  </div>

  <!-- 이미지 화면 -->
  <div class="screen" id="imageScreen">
    <button class="back-btn" onclick="showScreen('result')">← 결과로 돌아가기</button>
    <div class="img-header">
      <span id="imgCount" class="img-count"></span>
      <button class="btn-outline" style="width:auto;padding:8px 14px;font-size:13px" onclick="saveAllImages()">전체 저장</button>
    </div>
    <div id="imgGrid" class="img-grid"></div>
    <div id="imgLoading" class="img-loading">이미지를 불러오는 중...</div>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab-write" onclick="switchTab('write')">
      <span class="tab-icon">✏️</span>글 작성
    </button>
    <button class="tab" id="tab-image" onclick="switchTab('image')">
      <span class="tab-icon">🖼</span>이미지
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentJobId = localStorage.getItem('jobId') || null;
let pollTimer = null;
let resultData = null;
let collectedImages = [];
let currentScreen = 'form';

// 초기화
window.addEventListener('load', () => {
  loadRelated();
  const saved = localStorage.getItem('blogResult');
  if (saved) {
    try {
      resultData = JSON.parse(saved);
      showResult(resultData);
      return;
    } catch {}
  }
  if (currentJobId) {
    showScreen('loading');
    startPolling(currentJobId);
  }
});

// 관련 URL 저장/불러오기
function saveRelated() {
  const data = [0,1,2].map(i => document.getElementById(`related${i}`).value.trim());
  localStorage.setItem('relatedUrls', JSON.stringify(data));
}
function loadRelated() {
  try {
    const data = JSON.parse(localStorage.getItem('relatedUrls') || '[]');
    [0,1,2].forEach(i => {
      if (data[i]) document.getElementById(`related${i}`).value = data[i];
    });
  } catch {}
}

// 붙여넣기
async function pasteToInput(id) {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById(id).value = text.trim();
  } catch {
    showToast('붙여넣기 권한이 없어요. 직접 입력해주세요.');
  }
}

// 화면 전환
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');
  currentScreen = name;
  document.getElementById('tab-write').classList.toggle('active', name !== 'image');
  document.getElementById('tab-image').classList.toggle('active', name === 'image');
}

function switchTab(tab) {
  if (tab === 'image') {
    goToImages();
  } else {
    if (resultData) showScreen('result');
    else if (currentJobId) showScreen('loading');
    else showScreen('form');
  }
}

// 글 생성 시작
async function startGenerate() {
  const articleUrl = document.getElementById('articleUrl').value.trim();
  const keyword = document.getElementById('keyword').value.trim();
  const errorBox = document.getElementById('errorBox');

  if (!articleUrl) { showError('네이버 기사 URL을 입력해주세요.'); return; }
  if (!keyword) { showError('키워드를 입력해주세요.'); return; }
  errorBox.style.display = 'none';

  const relatedUrls = [0,1,2].map(i => document.getElementById(`related${i}`).value.trim()).filter(Boolean);

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  try {
    const res = await fetch('/api/blog/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ articleUrl, keyword, relatedUrls })
    });
    if (!res.ok) throw new Error('서버 오류');
    const { jobId } = await res.json();
    currentJobId = jobId;
    localStorage.setItem('jobId', jobId);
    showScreen('loading');
    startPolling(jobId);
  } catch (e) {
    showError('오류: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 블로그 글 생성하기';
  }
}

// 폴링
function startPolling(jobId) {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/api/blog/jobs/${jobId}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(pollTimer);
        currentJobId = null;
        localStorage.removeItem('jobId');
        resultData = data;
        localStorage.setItem('blogResult', JSON.stringify(data));
        showResult(data);
      } else if (data.status === 'failed') {
        clearInterval(pollTimer);
        currentJobId = null;
        localStorage.removeItem('jobId');
        showScreen('form');
        showError('생성 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch {}
  }, 3000);
}

function cancelGenerate() {
  clearInterval(pollTimer);
  currentJobId = null;
  localStorage.removeItem('jobId');
  showScreen('form');
}

// 결과 표시
function showResult(data) {
  document.getElementById('resultTitle').textContent = data.title || '';
  document.getElementById('resultContent').textContent = data.content || '';
  showScreen('result');
}

// 복사
async function copyText(type) {
  let text = '';
  let btnId = '';
  if (type === 'title') { text = resultData?.title || ''; btnId = 'copyTitleBtn'; }
  else if (type === 'content') { text = resultData?.content || ''; btnId = 'copyContentBtn'; }
  else { text = (resultData?.title || '') + '\n\n' + (resultData?.content || ''); btnId = 'copyBothBtn'; }

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  const btn = document.getElementById(btnId);
  const orig = btn.textContent;
  btn.textContent = '✓ 복사됐어요!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  showToast('복사됐어요!');
}

// 새 글 작성
function resetForm() {
  resultData = null;
  localStorage.removeItem('blogResult');
  document.getElementById('articleUrl').value = '';
  document.getElementById('keyword').value = '';
  collectedImages = [];
  showScreen('form');
}

// 이미지 화면
async function goToImages() {
  showScreen('image');
  if (collectedImages.length > 0) {
    renderImages(collectedImages);
    return;
  }
  document.getElementById('imgGrid').innerHTML = '';
  document.getElementById('imgLoading').style.display = 'block';
  document.getElementById('imgCount').textContent = '';

  try {
    const keywords = resultData?.keywords || [document.getElementById('keyword').value.trim()];
    const res = await fetch('/api/images/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords })
    });
    const data = await res.json();
    collectedImages = data.images || [];
    renderImages(collectedImages);
  } catch (e) {
    document.getElementById('imgLoading').textContent = '이미지를 가져오지 못했어요.';
  }
}

function renderImages(images) {
  document.getElementById('imgLoading').style.display = 'none';
  document.getElementById('imgCount').textContent = `${images.length}장의 이미지`;
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';

  images.forEach((url, i) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.innerHTML = `
      <img src="${url}" loading="lazy" onerror="this.parentElement.remove();updateImgCount()">
      <button class="img-save" onclick="saveImage('${url}', this)" title="저장">↓</button>
    `;
    grid.appendChild(item);
  });
}

function updateImgCount() {
  const count = document.getElementById('imgGrid').children.length;
  document.getElementById('imgCount').textContent = `${count}장의 이미지`;
}

// 이미지 저장
async function saveImage(url, btn) {
  try {
    btn.textContent = '...';
    const res = await fetch('/api/images/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const { base64, mimeType } = await res.json();
    const ext = mimeType.split('/')[1] || 'jpg';
    const a = document.createElement('a');
    a.href = `data:${mimeType};base64,${base64}`;
    a.download = `blog-image-${Date.now()}.${ext}`;
    a.click();
    btn.textContent = '✓';
    btn.classList.add('saved');
    showToast('저장됐어요!');
  } catch {
    btn.textContent = '↓';
    showToast('저장 실패. 다시 시도해주세요.');
  }
}

async function saveAllImages() {
  const imgs = document.querySelectorAll('#imgGrid .img-item img');
  let count = 0;
  for (const img of imgs) {
    if (img.complete && img.naturalWidth > 0) {
      const btn = img.parentElement.querySelector('.img-save');
      if (!btn.classList.contains('saved')) {
        await saveImage(img.src, btn);
        count++;
        await new Promise(r => setTimeout(r, 300));
      }
    }
  }
  showToast(`${count}장 저장 완료!`);
}

// 토스트
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}
</script>
</body>
</html>
